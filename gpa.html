<!DOCTYPE html>
<html>
<head>
  <title>GPA Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h1>TinkerAllDay</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="gpa.html">GPA Calculator</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="container">

  <div class="panel flex-panel">

  <div class="main">
    <h2>GPA Calculator</h2>

    <div id="classes"></div>

    <button onclick="addClass()">Add Class</button>
    <button onclick="calculateGPA()">Calculate GPA</button>

    <h3 id="gpaResult"></h3>
  </div>

  <div class="side">
    <h3>Grade Scale</h3>
    <ul>
      <li>A: 93–100</li>
      <li>A-: 90–92</li>
      <li>B+: 87–89</li>
      <li>B: 83–86</li>
      <li>B-: 80–82</li>
      <li>C+: 77–79</li>
      <li>C: 73–76</li>
      <li>C-: 70–72</li>
      <li>D+: 67–69</li>
      <li>D: 60–66</li>
      <li>F: 50–59</li>
    </ul>
  </div>
  </div>
</div>

<div class="panel" id="simulatorPanel">
  <h2>Grade Simulator</h2>

  <div id="categories"></div>

  <input type="text" id="newCategory" placeholder="New Category (e.g. Homework)">
  <input type="number" id="newWeight" placeholder="Weight (0-1)">
  <button onclick="addCategory()">Add Category</button>

  <h3>Add Assignment</h3>
  <select id="assignmentCategory">
    <option value="" disabled selected>Select Category</option>
  </select>
  <input type="number" id="pointsPossible" placeholder="Points Possible">
  <input type="number" id="pointsReceived" placeholder="Points Received">
  <button onclick="addAssignment()">Add Assignment</button>

  <h3 id="simResult"></h3>
</div>

</div>
<script>
  for(let i=0;i<7;i++){
    addClass();
  }
</script>
<script src="script.js"></script>
</body>
</html>
